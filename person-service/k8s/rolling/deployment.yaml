apiVersion: apps/v1
kind: Deployment
metadata:
  name: person-service
  namespace: dev
  labels:
    app: person-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: person-service

  template:
    metadata:
      labels:
        app: person-service

    spec:
      containers:
        - name: person-service
          image: saroja21/person-service:33

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Health checks for Kubernetes
          readinessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: person-service
  namespace: dev

spec:
  selector:
    app: person-service

  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

  type: ClusterIP
