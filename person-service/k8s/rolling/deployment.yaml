apiVersion: v1
kind: ConfigMap
metadata:
  name: person-service-config
  namespace: dev
data:
  DATABASE_NAME: bluegreen
  DATABASE_USER: bluegreen
  DATABASE_HOST: postgres
  DATABASE_PASSWORD: bluegreen
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bluegreen
  SPRING_DATASOURCE_USERNAME: bluegreen
  SPRING_DATASOURCE_PASSWORD: bluegreen
  SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: person-service
  namespace: dev
  labels:
    app: person-service

spec:
  replicas: 2
  

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
      
  selector:
    matchLabels:
      app: person-service

  template:
    metadata:
      labels:
        app: person-service

    spec:
      containers:
        - name: person-service
          image: saroja21/person-service:33

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          envFrom:
            - configMapRef:
                name: person-service-config

---

apiVersion: v1
kind: Service
metadata:
  name: person-service
  namespace: dev

spec:
  selector:
    app: person-service

  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP

  type: ClusterIP
